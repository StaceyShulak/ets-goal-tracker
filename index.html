<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ETS Goal Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,500&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --dark-green:#1a3228;
    --mid-green:#3d6b52;
    --light-green:#7aab8a;
    --pale-green:#b8d4c2;
    --gold:#c4956a;
    --off-white:#faf8f4;
    --beige:#f5f0e8;
    --white:#ffffff;
    --danger:#b5573f;
    --shadow: 0 2px 10px rgba(26,50,40,0.08);
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--off-white);
    color:var(--dark-green);
    font-family:'DM Sans', sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  h1,h2,h3, .serif{
    font-family:'Cormorant Garamond', serif;
  }
  header{
    background:var(--dark-green);
    color:var(--off-white);
    padding:28px 32px 24px;
  }
  header .eyebrow{
    font-size:12px;
    letter-spacing:0.14em;
    text-transform:uppercase;
    color:var(--pale-green);
    margin-bottom:6px;
  }
  header h1{
    margin:0;
    font-size:34px;
    font-weight:600;
    letter-spacing:0.01em;
  }
  header p{
    margin:6px 0 0;
    color:var(--pale-green);
    font-size:14px;
  }
  .wrap{
    max-width:1080px;
    margin:0 auto;
    padding:28px 24px 80px;
  }
  .dash{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:14px;
    margin-bottom:28px;
  }
  .card{
    background:var(--white);
    border:1px solid var(--beige);
    border-radius:10px;
    padding:16px 18px;
    box-shadow:var(--shadow);
  }
  .card .num{
    font-family:'Cormorant Garamond', serif;
    font-size:32px;
    font-weight:600;
    color:var(--mid-green);
    line-height:1;
  }
  .card .lbl{
    font-size:12px;
    color:var(--mid-green);
    text-transform:uppercase;
    letter-spacing:0.08em;
    margin-top:6px;
  }
  .toolbar{
    display:flex;
    gap:10px;
    align-items:center;
    flex-wrap:wrap;
    margin-bottom:18px;
  }
  .toolbar input[type=text], .toolbar select{
    font-family:'DM Sans', sans-serif;
    padding:9px 11px;
    border:1px solid var(--pale-green);
    border-radius:8px;
    font-size:14px;
    background:var(--white);
    color:var(--dark-green);
  }
  .btn{
    font-family:'DM Sans', sans-serif;
    padding:9px 16px;
    border:1px solid var(--mid-green);
    border-radius:8px;
    background:var(--mid-green);
    color:var(--white);
    cursor:pointer;
    font-size:14px;
    font-weight:500;
    transition:all 0.2s;
  }
  .btn:hover{background:var(--dark-green);}
  .btn.ghost{background:var(--white); color:var(--mid-green); border-color:var(--pale-green);}
  .btn.gold{background:var(--gold); color:var(--white); border-color:var(--gold);}
  .btn.gold:hover{opacity:0.9;}
  .btn.small{padding:6px 12px; font-size:13px;}
  .goal-card{
    background:var(--white);
    border:1px solid var(--beige);
    border-radius:10px;
    padding:16px;
    margin-bottom:12px;
    box-shadow:var(--shadow);
  }
  .goal-header{display:flex; justify-content:space-between; align-items:start; margin-bottom:8px;}
  .goal-title{font-size:16px; font-weight:600; color:var(--dark-green);}
  .goal-meta{font-size:12px; color:#999; margin:4px 0;}
  .goal-status{
    display:inline-block;
    padding:3px 10px;
    border-radius:20px;
    font-size:11px;
    font-weight:600;
    text-transform:uppercase;
    letter-spacing:0.05em;
  }
  .goal-status.in-progress{background:#e8f4f8; color:var(--mid-green);}
  .goal-status.completed{background:#d4f1d4; color:#2d7a3f;}
  .goal-status.at-risk{background:#fcd4d4; color:var(--danger);}
  .goal-status.on-track{background:#f0ead4; color:var(--gold);}
  .goal-status.not-started{background:#f5f0e8; color:#999;}
  .notes{
    font-size:13px;
    color:#555;
    margin-top:8px;
    font-style:italic;
  }
  .goal-bottom{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-top:14px;
    flex-wrap:wrap;
    gap:10px;
  }
  .streak{
    font-size:13px;
    color:var(--mid-green);
  }
  .streak b{
    font-family:'Cormorant Garamond', serif;
    font-size:20px;
    color:var(--gold);
    margin-right:4px;
  }
  .actions{display:flex; gap:8px; flex-wrap:wrap;}
  .progressbar{
    width:100%;
    height:6px;
    background:var(--beige);
    border-radius:4px;
    margin-top:10px;
    overflow:hidden;
  }
  .progressbar-fill{
    height:100%;
    background:var(--mid-green);
  }
  .empty{
    text-align:center;
    padding:60px 20px;
    color:var(--mid-green);
  }
  .empty h2{font-size:26px; margin-bottom:6px;}
  .overlay{
    position:fixed; inset:0;
    background:rgba(26,50,40,0.45);
    display:none;
    align-items:center;
    justify-content:center;
    padding:20px;
    z-index:50;
  }
  .overlay.show{display:flex;}
  .modal{
    background:var(--off-white);
    border-radius:14px;
    width:100%;
    max-width:520px;
    max-height:90vh;
    overflow-y:auto;
    padding:26px 26px 22px;
    box-shadow:0 10px 40px rgba(0,0,0,0.25);
  }
  .modal h2{margin:0 0 16px;}
  .field{margin-bottom:14px;}
  .field label{
    display:block;
    font-size:12px;
    text-transform:uppercase;
    letter-spacing:0.06em;
    color:var(--mid-green);
    margin-bottom:5px;
    font-weight:600;
  }
  .field input, .field select, .field textarea{
    width:100%;
    font-family:'DM Sans', sans-serif;
    padding:9px 11px;
    border:1px solid var(--pale-green);
    border-radius:8px;
    font-size:14px;
    background:var(--white);
    color:var(--dark-green);
  }
  .field textarea{resize:vertical; min-height:60px;}
  .field-row{display:flex; gap:12px;}
  .field-row .field{flex:1;}
  .modal-actions{
    display:flex;
    justify-content:flex-end;
    gap:10px;
    margin-top:8px;
  }
  .toast{
    position:fixed;
    bottom:24px;
    left:50%;
    transform:translateX(-50%);
    background:var(--dark-green);
    color:var(--off-white);
    padding:10px 20px;
    border-radius:8px;
    font-size:13px;
    opacity:0;
    pointer-events:none;
    transition:opacity 0.25s ease;
    z-index:100;
  }
  .toast.show{opacity:1;}
  @media (max-width:720px){
    .dash{grid-template-columns:repeat(2,1fr);}
    .field-row{flex-direction:column;}
  }
</style>
</head>
<body>

<header>
  <div class="eyebrow">Empower Through Sports</div>
  <h1>Goal Tracker</h1>
  <p>Set it, log it, keep it moving.</p>
</header>

<div class="wrap">
  <div class="dash" id="dash"></div>
  <div class="toolbar">
    <input type="text" id="search" placeholder="Search goals...">
    <select id="sortSelect">
      <option value="created">Sort: Newest</option>
      <option value="priority">Sort: Priority</option>
      <option value="status">Sort: Status</option>
    </select>
    <button class="btn gold" id="addBtn">+ Add Goal</button>
  </div>
  <div id="goalList"></div>
</div>

<div class="overlay" id="overlay">
  <div class="modal">
    <h2 id="modalTitle" class="serif">Add Goal</h2>
    <div class="field">
      <label>Goal</label>
      <input type="text" id="f_goal" placeholder="e.g. Run a 10K">
    </div>
    <div class="field-row">
      <div class="field">
        <label>Category</label>
        <select id="f_category">
          <option>Health</option>
          <option>Personal Growth</option>
          <option>Productivity</option>
          <option>Finance</option>
          <option>Relationships</option>
        </select>
      </div>
      <div class="field">
        <label>Frequency</label>
        <select id="f_frequency">
          <option>Daily</option>
          <option>Weekly</option>
          <option>Monthly</option>
          <option>One-time</option>
        </select>
      </div>
    </div>
    <div class="field-row">
      <div class="field">
        <label>Status</label>
        <select id="f_status">
          <option value="not-started">Not Started</option>
          <option value="in-progress" selected>In Progress</option>
          <option value="on-track">On Track</option>
          <option value="at-risk">At Risk</option>
          <option value="completed">Completed</option>
        </select>
      </div>
      <div class="field">
        <label>Priority</label>
        <select id="f_priority">
          <option value="high">High</option>
          <option value="medium" selected>Medium</option>
          <option value="low">Low</option>
        </select>
      </div>
    </div>
    <div class="field">
      <label>Target Date (optional)</label>
      <input type="date" id="f_deadline">
    </div>
    <div class="field">
      <label>Notes</label>
      <textarea id="f_notes" placeholder="Any notes..."></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn ghost" id="cancelBtn">Cancel</button>
      <button class="btn" id="saveBtn">Save Goal</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- Firebase Config -->
<script src="firebase-config.js"></script>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database-compat.js"></script>

<script>
const $ = (id) => document.getElementById(id);
let db = null;
let goals = [];
let editingId = null;

function initFirebase() {
  if (!window.firebaseConfig) {
    alert('Firebase config missing. Check firebase-config.js');
    return;
  }
  try {
    firebase.initializeApp(window.firebaseConfig);
    db = firebase.database();
    loadGoals();
  } catch (error) {
    alert('Firebase error: ' + error.message);
  }
}

function loadGoals() {
  if (!db) return;
  db.ref('goals').on('value', (snapshot) => {
    goals = snapshot.val() || [];
    if (!Array.isArray(goals)) goals = [];
    render();
  });
}

function saveGoal(goal) {
  if (!db) return;
  const id = goal.id || 'g' + Date.now();
  goal.id = id;
  db.ref('goals/' + id).set(goal, (error) => {
    if (error) showToast('Save failed');
    else showToast('Goal saved!');
  });
}

function deleteGoal(id) {
  if (!db) return;
  if (!confirm('Delete this goal?')) return;
  db.ref('goals/' + id).remove((error) => {
    if (error) showToast('Delete failed');
    else showToast('Goal deleted');
  });
}

function render() {
  const list = $('goalList');
  const dash = $('dash');

  if (!goals.length) {
    list.innerHTML = '<div class="empty"><h2>No goals yet</h2><p>Create your first goal to get started</p></div>';
    dash.innerHTML = '<div class="card"><div class="num">0</div><div class="lbl">Total Goals</div></div>' +
      '<div class="card"><div class="num">0</div><div class="lbl">In Progress</div></div>' +
      '<div class="card"><div class="num">0</div><div class="lbl">Completed</div></div>' +
      '<div class="card"><div class="num">0</div><div class="lbl">At Risk</div></div>';
    return;
  }

  const total = goals.length;
  const inProgress = goals.filter(g => g.status === 'in-progress').length;
  const completed = goals.filter(g => g.status === 'completed').length;
  const atRisk = goals.filter(g => g.status === 'at-risk').length;

  dash.innerHTML = `
    <div class="card"><div class="num">${total}</div><div class="lbl">Total Goals</div></div>
    <div class="card"><div class="num">${inProgress}</div><div class="lbl">In Progress</div></div>
    <div class="card"><div class="num">${completed}</div><div class="lbl">Completed</div></div>
    <div class="card"><div class="num">${atRisk}</div><div class="lbl">At Risk</div></div>
  `;

  list.innerHTML = goals.map(goal => `
    <div class="goal-card">
      <div class="goal-header">
        <div>
          <div class="goal-title">${escapeHtml(goal.name)}</div>
          <div class="goal-meta">${goal.category} • ${goal.frequency}</div>
          <span class="goal-status ${goal.status}">${goal.status}</span>
        </div>
      </div>
      ${goal.notes ? '<div class="notes">' + escapeHtml(goal.notes) + '</div>' : ''}
      <div class="goal-bottom">
        <div class="actions">
          <button class="btn ghost small" onclick="editGoal('${goal.id}')">Edit</button>
          <button class="btn ghost small" onclick="deleteGoal('${goal.id}')">Delete</button>
        </div>
      </div>
    </div>
  `).join('');
}

function editGoal(id) {
  const goal = goals.find(g => g.id === id);
  if (!goal) return;
  editingId = id;
  $('modalTitle').textContent = 'Edit Goal';
  $('f_goal').value = goal.name;
  $('f_category').value = goal.category;
  $('f_frequency').value = goal.frequency;
  $('f_status').value = goal.status;
  $('f_priority').value = goal.priority;
  $('f_deadline').value = goal.deadline || '';
  $('f_notes').value = goal.notes || '';
  $('overlay').classList.add('show');
}

function showModal() {
  editingId = null;
  $('modalTitle').textContent = 'Add Goal';
  $('f_goal').value = '';
  $('f_category').value = 'Health';
  $('f_frequency').value = 'Daily';
  $('f_status').value = 'in-progress';
  $('f_priority').value = 'medium';
  $('f_deadline').value = '';
  $('f_notes').value = '';
  $('overlay').classList.add('show');
}

function hideModal() {
  $('overlay').classList.remove('show');
}

function showToast(msg) {
  const t = $('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1800);
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

$('addBtn').onclick = showModal;
$('cancelBtn').onclick = hideModal;
$('saveBtn').onclick = () => {
  const goal = {
    id: editingId,
    name: $('f_goal').value,
    category: $('f_category').value,
    frequency: $('f_frequency').value,
    status: $('f_status').value,
    priority: $('f_priority').value,
    deadline: $('f_deadline').value,
    notes: $('f_notes').value,
    created: editingId ? undefined : new Date().toISOString()
  };
  if (!goal.name) {
    showToast('Goal name required');
    return;
  }
  saveGoal(goal);
  hideModal();
};

window.addEventListener('DOMContentLoaded', initFirebase);
</script>

</body>
</html>
